permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true
name: pytest
jobs:
  test:
    name: run py tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          submodules: true

      - name: Install stable
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # branch=master
        with:
          toolchain: stable

      - name: cargo generate-lockfile
        # enable this ci template to run regardless of whether the lockfile is checked in or not
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: set up
        uses: actions/setup-python@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: dependencies
        run: uv sync --group dev

      - name: run
        run: uv run pytest --cov --cov-branch --cov-report=xml

      - name: Upload to codecov.io
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # tag=v6.0.1
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,PYTHON
  os-check:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / python
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          submodules: true

      - name: Install stable
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # branch=master
        with:
          toolchain: stable

      - name: set up
        uses: actions/setup-python@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: dependencies
        run: uv sync

      - name: run
        run: uv run pytest

